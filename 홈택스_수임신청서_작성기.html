<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>홈택스 수임신청서 자동입력</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;background:#f0f2f5;color:#222;height:100vh;display:flex;flex-direction:column;}
header{background:#1a4a8a;color:#fff;padding:12px 20px;font-size:16px;font-weight:bold;flex-shrink:0;}
.wrap{display:flex;flex:1;overflow:hidden;}
/* ── Left form panel ── */
.form-panel{width:300px;flex-shrink:0;background:#fff;border-right:1px solid #dde;overflow-y:auto;padding:16px;}
.form-panel h3{font-size:13px;color:#1a4a8a;border-bottom:2px solid #1a4a8a;padding-bottom:4px;margin:14px 0 8px;}
.form-panel h3:first-child{margin-top:0;}
label{display:block;font-size:11px;color:#555;margin-bottom:2px;margin-top:8px;}
label.first{margin-top:0;}
input[type=text]{width:100%;border:1px solid #ccd;border-radius:4px;padding:6px 8px;font-size:12px;font-family:'Malgun Gothic','맑은 고딕',sans-serif;}
input[type=text]:focus{outline:none;border-color:#1a4a8a;box-shadow:0 0 0 2px rgba(26,74,138,.15);}
.opt{display:flex;flex-direction:column;gap:6px;margin-top:4px;}
.opt label{display:flex;align-items:center;gap:6px;font-size:12px;color:#333;margin:0;cursor:pointer;}
.opt input[type=radio]{width:14px;height:14px;accent-color:#1a4a8a;}
.note{font-size:10px;color:#888;margin-top:3px;}
.btn-row{margin-top:18px;display:flex;gap:8px;}
button{flex:1;padding:10px;font-size:13px;font-family:'Malgun Gothic','맑은 고딕',sans-serif;border:none;border-radius:5px;cursor:pointer;font-weight:bold;}
#btn-download{background:#1a4a8a;color:#fff;}
#btn-reset{background:#fff;color:#c0392b;border:1.5px solid #e0b0ae;margin-top:8px;font-size:12px;padding:8px;}
button:hover{filter:brightness(1.08);}
/* ── Right preview panel ── */
.preview-panel{flex:1;overflow:auto;background:#888;display:flex;justify-content:center;padding:20px;}
#preview-canvas{box-shadow:0 4px 20px rgba(0,0,0,.4);background:#fff;}
.file-btn{display:flex;align-items:center;gap:6px;margin-top:4px;}
.file-btn input[type=file]{display:none;}
.file-lbl{flex:1;padding:7px 8px;font-size:11px;background:#f5f7fa;border:1px dashed #aab;border-radius:4px;cursor:pointer;color:#555;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.file-lbl:hover{background:#e8eef7;border-color:#1a4a8a;color:#1a4a8a;}
.file-lbl.drag-over{background:#ddeeff;border-color:#1a4a8a;border-style:solid;color:#1a4a8a;}
.file-clr{width:26px;height:26px;border:1px solid #ccd;border-radius:4px;background:#fff;color:#999;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0;padding:0;}
.file-clr.on{display:flex;}
</style>
</head>
<body>
<header>홈택스 세무대리정보 이용(해지)신청서 – 자동입력</header>
<div class="wrap">
  <!-- ── 입력 폼 ── -->
  <div class="form-panel">
    <h3 style="margin-top:0">신청인 구분</h3>
    <div class="opt" style="flex-direction:row;gap:20px;margin-bottom:4px">
      <label><input type="radio" name="biztype" value="individual" checked> 개인</label>
      <label><input type="radio" name="biztype" value="corp"> 법인</label>
    </div>

    <h3>① 신청인 정보</h3>
    <label class="first">성명 (대표자명) <span style="color:#c00">*</span></label>
    <input id="appl_name" type="text" placeholder="홍길동">
    <label>주민등록번호 <span style="color:#c00">*</span></label>
    <input id="appl_rn" type="text" placeholder="000000-0000000" oninput="this.value=fmtRN(this.value)">
    <label>상호 / 법인명 <span style="color:#888;font-size:10px">(선택)</span></label>
    <input id="appl_co" type="text" placeholder="">
    <label>사업자등록번호 <span style="color:#888;font-size:10px">(선택)</span></label>
    <input id="appl_brn" type="text" placeholder="000-00-00000" oninput="this.value=fmtBRN(this.value);schedulePreview()">
    <label>휴대전화번호</label>
    <input id="appl_tel" type="text" placeholder="010-0000-0000" oninput="this.value=fmtTel(this.value);schedulePreview()">

    <h3>② 신청 구분</h3>
    <div class="opt">
      <label><input type="radio" name="rtype" value="1"> 정보이용 신청</label>
      <label><input type="radio" name="rtype" value="2"> 기존 정보이용 해지 후 새로운 정보이용 신청</label>
      <label><input type="radio" name="rtype" value="3"> 정보이용 해지신청</label>
    </div>

    <h3>③ 위임받은 사람 (세무사)</h3>
    <label class="first">성명</label>
    <input id="del_name" type="text" placeholder="담당 세무사 이름" oninput="saveDel()">
    <label>주민등록번호</label>
    <input id="del_rn" type="text" placeholder="000000-0000000" oninput="this.value=fmtRN(this.value);saveDel()">

    <h3>④ 첨부 서류</h3>
    <label class="first">위임받은 사람 신분증 <span style="color:#1a4a8a;font-size:10px">(자동저장)</span></label>
    <div class="file-btn">
      <label class="file-lbl" id="del-id-lbl" for="del_id">📎 파일 선택 또는 드래그</label>
      <input type="file" id="del_id" accept="image/*,application/pdf" onchange="onDelIdChange(this)">
      <button class="file-clr" id="del-id-clr" type="button" onclick="clearDelId()">✕</button>
    </div>
    <label style="margin-top:10px">위임자 신분증</label>
    <div class="file-btn">
      <label class="file-lbl" id="appl-id-lbl" for="appl_id">📎 파일 선택 또는 드래그</label>
      <input type="file" id="appl_id" accept="image/*,application/pdf" onchange="onApplIdChange(this)">
      <button class="file-clr" id="appl-id-clr" type="button" onclick="clearApplId()">✕</button>
    </div>

    <div class="btn-row">
      <button id="btn-download" onclick="doDownload()">PDF 저장</button>
    </div>
    <button id="btn-reset" onclick="resetForm()" style="width:100%;margin-top:8px">↺ 새로 작성하기</button>
    <p class="note" style="margin-top:8px">※ 위임받은 사람 정보와 첨부파일은 유지됩니다.</p>
  </div>

  <!-- ── 미리보기 ── -->
  <div class="preview-panel" id="preview-panel">
    <canvas id="preview-canvas"></canvas>
  </div>
</div>

let pdfPage = null;
let bgCanvas = null, bgScale = -1;
let renderPending = false;

/* ── PDF 로드 ── */
async function loadPDF() {
  const raw = atob(PDF_B64);
  const buf = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);
  const pdf = await pdfjsLib.getDocument({data: buf}).promise;
  pdfPage = await pdf.getPage(1);
}

/* ── PDF 백그라운드 캐시 ── */
async function getBg(scale) {
  if (Math.abs(bgScale - scale) > 0.001) {
    bgCanvas = document.createElement('canvas');
    const vp = pdfPage.getViewport({scale});
    bgCanvas.width = vp.width;
    bgCanvas.height = vp.height;
    await pdfPage.render({canvasContext: bgCanvas.getContext('2d'), viewport: vp}).promise;
    bgScale = scale;
  }
  return bgCanvas;
}

/* ── 캔버스에 렌더링 ── */
async function renderToCanvas(canvas, scale) {
  const bg = await getBg(scale);
  canvas.width  = bg.width;
  canvas.height = bg.height;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(bg, 0, 0);
  drawOverlays(ctx, scale);
}

/* ── 값 가져오기 ── */
function v(id) { return (document.getElementById(id) || {}).value?.trim() || ''; }
function radioVal(name) {
  const el = document.querySelector(`input[name="${name}"]:checked`);
  return el ? el.value : null;
}

/* ── 오버레이 그리기 ── */
function drawOverlays(ctx, s) {
  const name  = v('appl_name');
  const rn    = v('appl_rn');
  const co    = v('appl_co');
  const brn   = v('appl_brn');
  const tel   = v('appl_tel');
  const dname = v('del_name');
  const drn   = v('del_rn');
  const rt      = radioVal('rtype');
  const biztype  = radioVal('biztype');

  const now = new Date();
  const yr  = String(now.getFullYear());
  const mo  = String(now.getMonth() + 1);
  const dy  = String(now.getDate());

  const KF  = "'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo','Nanum Gothic',sans-serif";
  const KFS = "'Batang','바탕체','Malgun Gothic','맑은 고딕',serif";

  ctx.save();

  /* helper: 좌측정렬 텍스트 */
  function T(text, px, py, sz = 9, bold = false) {
    if (!text) return;
    ctx.font = `${bold ? 'bold ' : ''}${sz * s}px ${KF}`;
    ctx.fillStyle = '#000';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText(text, px * s, py * s);
  }

  /* helper: 우측정렬 텍스트 (px = 기준 오른쪽 끝) */
  function TR(text, px, py, sz = 9) {
    if (!text) return;
    ctx.font = `${sz * s}px ${KF}`;
    ctx.fillStyle = '#000';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText(text, px * s, py * s);
  }

  /* ── 1. 신청인 정보 ── */
  T(name, 175, 136);          // ① 성명
  T(rn,   342, 136);          // ② 주민번호
  T(co,   175, 161);          // ③-1 상호
  T(brn,  342, 161);          // ④-1 사업자번호
  T(tel,  430, 205);          // ⑤ 휴대전화

  /* ── 2. 날짜 ── */
  TR(yr,  430, 467, 10);
  TR(mo,  463, 467, 10);
  TR(dy,  496, 467, 10);

  /* ── 3. 신청구분 체크박스 ── */
  // □ 위치: font-size 12, baseline y. □ glyph ≈ 9×9pt
  if (rt === '1') fillBox(ctx, 251.3, 226.2, s, 12);
  if (rt === '2') fillBox(ctx, 396.7, 242.9, s, 12);
  if (rt === '3') fillBox(ctx, 273.7, 259.4, s, 12);

  /* ── 5. 신청인 서명 (본문) ── */
  T(name, 415, 482, 10);
  if (biztype === 'corp') { if (co) drawCorpStamp(ctx, 498, 477, co, s, 17); }
  else { if (name) drawStamp(ctx, 498, 477, name, s, 11, 14); }

  /* ── 6. 위임장 – 위임하는 사람 ── */
  T(name, 408, 572, 10);
  if (biztype === 'corp') { if (co) drawCorpStamp(ctx, 495, 567, co, s, 17); }
  else { if (name) drawStamp(ctx, 495, 567, name, s, 11, 14); }

  /* ── 7. 위임받은 사람 ── */
  T(dname, 230, 590, 9);
  T(drn, 415, 590, 9);

  /* ── 8. 개인정보 – 신청인 ── */
  T(name, 128, 703, 9);
  if (biztype === 'corp') { if (co) drawCorpStamp(ctx, 242, 698, co, s, 17); }
  else { if (name) drawStamp(ctx, 242, 698, name, s, 11, 14); }

  /* ── 9. 개인정보 – 위임받은 사람 ── */
  T(dname, 387, 703, 9);
  if (dname) drawStamp(ctx, 491, 698, dname, s, 11, 14);

  ctx.restore();
}

/* ── □ 위에 ✓ 체크표시 그리기 (□는 유지) ── */
function fillBox(ctx, px, py, s, fontSize) {
  const sz = fontSize * 0.82;
  const top = (py - sz) * s;
  const x0 = px * s, y0 = top;
  const w = sz * s, h = sz * s;
  ctx.save();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1.8 * s;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(x0 + w * 0.08, y0 + h * 0.52);
  ctx.lineTo(x0 + w * 0.38, y0 + h * 0.85);
  ctx.lineTo(x0 + w * 0.92, y0 + h * 0.1);
  ctx.stroke();
  ctx.restore();
}

/* ── 법인 원형 도장 ── */
function drawCorpStamp(ctx, cx, cy, coName, s, r) {
  ctx.save();
  const scx = cx * s, scy = cy * s, sr = r * s;

  // 배경
  ctx.fillStyle = 'rgba(200,0,0,0.05)';
  ctx.beginPath();
  ctx.arc(scx, scy, sr, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = '#cc0000';

  // 바깥 원
  ctx.lineWidth = 1.8 * s;
  ctx.beginPath();
  ctx.arc(scx, scy, sr, 0, Math.PI * 2);
  ctx.stroke();

  // 안쪽 원 (60%)
  const innerR = sr * 0.55;
  ctx.lineWidth = 1.2 * s;
  ctx.beginPath();
  ctx.arc(scx, scy, innerR, 0, Math.PI * 2);
  ctx.stroke();

  // ── 테두리 텍스트 (회사명) ──
  const chars = [...coName.replace(/\(주\)/gi, '㈜')];  // (주)→㈜ 한글자 처리
  const total  = chars.length + 1;        // +1: 꼭대기 점
  const textR  = (sr + innerR) / 2;
  const ringGap = sr - innerR;
  const perA   = (Math.PI * 2) / total;
  const fz = Math.min(textR * perA * 0.88, ringGap * 0.82);
  const dotA   = -Math.PI / 2;           // 점 고정 위치 (꼭대기 정가운데)

  ctx.fillStyle = '#cc0000';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // 점: 꼭대기 고정
  ctx.save();
  ctx.translate(scx + textR * Math.cos(dotA), scy + textR * Math.sin(dotA));
  ctx.rotate(dotA + Math.PI / 2);
  ctx.font = `${fz * 0.55}px sans-serif`;
  ctx.fillText('●', 0, 0);
  ctx.restore();

  // 회사명: 점 이후부터 반시계방향
  ctx.font = `bold ${fz}px 'Malgun Gothic','맑은 고딕',sans-serif`;
  chars.forEach((c, i) => {
    const a = dotA + perA * (i + 1);    // 점 다음 슬롯부터 시계방향(오른쪽)
    ctx.save();
    ctx.translate(scx + textR * Math.cos(a), scy + textR * Math.sin(a));
    ctx.rotate(a + Math.PI / 2);
    ctx.fillText(c, 0, 0);
    ctx.restore();
  });

  // ── 중앙 한자: 2열 격자 배치 (代理 / 事業 / 者) ──
  const hanjaRows = [['代','表'], ['理','事']];
  const hjFz  = innerR * 0.74;
  const hjRowH = hjFz * 1.02;
  const hjColW = hjFz * 1.02;
  const totalHJ = hjRowH * hanjaRows.length;
  ctx.strokeStyle = '#cc0000';
  ctx.lineWidth   = hjFz * 0.10;
  ctx.lineJoin    = 'round';
  ctx.font = `bold ${hjFz}px 'Batang','바탕체','Malgun Gothic',serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  hanjaRows.forEach((row, ri) => {
    const ry = scy - totalHJ / 2 + hjRowH * (ri + 0.5);
    if (row.length === 2) {
      [[row[0], scx - hjColW / 2], [row[1], scx + hjColW / 2]].forEach(([c, rx]) => {
        ctx.strokeText(c, rx, ry);
        ctx.fillText(c, rx, ry);
      });
    } else {
      ctx.strokeText(row[0], scx, ry);
      ctx.fillText(row[0], scx, ry);
    }
  });

  ctx.restore();
}

/* ── 세로 타원 도장 ── */
function drawStamp(ctx, cx, cy, name, s, rx, ry) {
  ctx.save();
  const scx = cx * s, scy = cy * s;
  const srx = rx * s, sry = ry * s;

  // 배경 (옅은 붉은 칠)
  ctx.fillStyle = 'rgba(200,0,0,0.05)';
  ctx.beginPath();
  ctx.ellipse(scx, scy, srx, sry, 0, 0, Math.PI * 2);
  ctx.fill();

  // 바깥 타원
  ctx.strokeStyle = '#cc0000';
  ctx.lineWidth = 1.8 * s;
  ctx.beginPath();
  ctx.ellipse(scx, scy, srx, sry, 0, 0, Math.PI * 2);
  ctx.stroke();

  // 세로 글자
  ctx.fillStyle = '#cc0000';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const chars = [...name].slice(0, 4);
  const fz = Math.round(sry * 1.8 / chars.length);
  ctx.font = `bold ${fz}px 'Batang','바탕체','Malgun Gothic','맑은 고딕',serif`;

  ctx.strokeStyle = '#cc0000';
  ctx.lineWidth = fz * 0.12;   // 글자 두께 (font-size의 12%)
  ctx.lineJoin = 'round';
  const totalH = fz * chars.length;
  chars.forEach((c, i) => {
    const cy2 = scy - totalH / 2 + fz * (i + 0.5);
    ctx.strokeText(c, scx, cy2);  // 테두리 먼저
    ctx.fillText(c, scx, cy2);    // 채우기
  });
  ctx.restore();
}

/* ── 자동 하이픈 ── */
function fmtRN(v) {
  const d = v.replace(/\D/g, '').slice(0, 13);
  if (d.length <= 6) return d;
  return d.slice(0, 6) + '-' + d.slice(6);
}
function fmtBRN(v) {
  const d = v.replace(/\D/g, '').slice(0, 10);
  if (d.length <= 3) return d;
  if (d.length <= 5) return d.slice(0,3)+'-'+d.slice(3);
  return d.slice(0,3)+'-'+d.slice(3,5)+'-'+d.slice(5);
}
function fmtTel(v) {
  const d = v.replace(/\D/g, '').slice(0, 11);
  if (d.length <= 3) return d;
  if (d.length <= 7) return d.slice(0,3)+'-'+d.slice(3);
  if (d.length <= 10) return d.slice(0,3)+'-'+d.slice(3,6)+'-'+d.slice(6);
  return d.slice(0,3)+'-'+d.slice(3,7)+'-'+d.slice(7);
}

/* ── 위임받은 사람 저장/불러오기 ── */
function saveDel() {
  localStorage.setItem('del_name', v('del_name'));
  localStorage.setItem('del_rn',   v('del_rn'));
}

/* ── 첨부 파일 ── */
let delIdData = null;
let applIdData = null;

function setFileUI(who, name) {
  const lbl = document.getElementById(who + '-id-lbl');
  const clr = document.getElementById(who + '-id-clr');
  lbl.textContent = name ? '\uD83D\uDCCE ' + name : '\uD83D\uDCCE 파일 선택';
  if (name) clr.classList.add('on'); else clr.classList.remove('on');
}
/* ── 드래그앤드롭 ── */
function processDroppedFile(file, who) {
  if (!file) return;
  const accept = ['image/jpeg','image/png','image/gif','image/webp','application/pdf'];
  if (!accept.includes(file.type)) {
    alert('이미지(JPG, PNG) 또는 PDF 파일만 첨부할 수 있습니다.');
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    if (who === 'del') {
      delIdData = e.target.result;
      try {
        localStorage.setItem('del_id_data', delIdData);
        localStorage.setItem('del_id_name', file.name);
      } catch(err) { alert('파일이 너무 커서 자동저장이 안 됩니다. (약 3MB 이내 권장)'); }
    } else {
      applIdData = e.target.result;
    }
    setFileUI(who, file.name);
  };
  reader.readAsDataURL(file);
}

function initDrop(lblId, who) {
  const lbl = document.getElementById(lblId);
  lbl.addEventListener('dragover', (e) => {
    e.preventDefault();
    lbl.classList.add('drag-over');
  });
  lbl.addEventListener('dragleave', () => lbl.classList.remove('drag-over'));
  lbl.addEventListener('drop', (e) => {
    e.preventDefault();
    lbl.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    processDroppedFile(file, who);
  });
}

function onDelIdChange(input) {
  if (input.files[0]) processDroppedFile(input.files[0], 'del');
}
function onApplIdChange(input) {
  if (input.files[0]) processDroppedFile(input.files[0], 'appl');
}
function clearDelId() {
  delIdData = null;
  localStorage.removeItem('del_id_data');
  localStorage.removeItem('del_id_name');
  document.getElementById('del_id').value = '';
  setFileUI('del', null);
}
function clearApplId() {
  applIdData = null;
  document.getElementById('appl_id').value = '';
  setFileUI('appl', null);
}
function loadDelIdFromStorage() {
  const data = localStorage.getItem('del_id_data');
  const name = localStorage.getItem('del_id_name');
  if (data && name) { delIdData = data; setFileUI('del', name); }
}
async function addAttachmentPage(pdf, dataUrl) {
  const pw = pdf.internal.pageSize.getWidth();
  const ph = pdf.internal.pageSize.getHeight();
  if (dataUrl.includes('application/pdf')) {
    const raw = atob(dataUrl.split(',')[1]);
    const buf = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);
    const adoc = await pdfjsLib.getDocument({data: buf}).promise;
    for (let pn = 1; pn <= adoc.numPages; pn++) {
      pdf.addPage();
      const pg = await adoc.getPage(pn);
      const vp = pg.getViewport({scale: 2.0});
      const cv = document.createElement('canvas');
      cv.width = vp.width; cv.height = vp.height;
      await pg.render({canvasContext: cv.getContext('2d'), viewport: vp}).promise;
      pdf.addImage(cv.toDataURL('image/jpeg', 0.90), 'JPEG', 0, 0, pw, ph);
    }
  } else {
    pdf.addPage();
    const img = new Image();
    img.src = dataUrl;
    await new Promise(r => img.onload = r);
    const ratio = img.naturalWidth / img.naturalHeight;
    let w = pw, h = pw / ratio;
    if (h > ph) { h = ph; w = ph * ratio; }
    const fmt = dataUrl.includes('image/png') ? 'PNG' : 'JPEG';
    pdf.addImage(dataUrl, fmt, (pw - w) / 2, (ph - h) / 2, w, h);
  }
}

function loadDel() {
  const n = localStorage.getItem('del_name');
  const r = localStorage.getItem('del_rn');
  if (n) document.getElementById('del_name').value = n;
  if (r) document.getElementById('del_rn').value   = r;
}

/* ── 미리보기 갱신 ── */
let debounceTimer = null;
async function doPreview() {
  if (!pdfPage) return;
  const panel = document.getElementById('preview-panel');
  const canvas = document.getElementById('preview-canvas');
  // 패널 여백(좌우 각 20px) 제외한 너비
  const w = panel.clientWidth - 40;
  const scale = w / 595.32;
  await renderToCanvas(canvas, scale);
}

function schedulePreview() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(doPreview, 120);
}


/* ── 새로 작성하기 ── */
function resetForm() {
  if (!confirm('신청인 정보를 초기화할까요?\n위임받은 사람 정보와 첨부파일은 유지됩니다.')) return;
  // 신청인 필드 초기화
  ['appl_name','appl_rn','appl_co','appl_brn','appl_tel'].forEach(id => {
    document.getElementById(id).value = '';
  });
  // 신청구분 라디오 해제
  document.querySelectorAll('input[name="rtype"]').forEach(r => r.checked = false);
  // 위임자 신분증 초기화 (위임받은 사람 신분증은 유지)
  clearApplId();
  // 미리보기 갱신
  doPreview();
}

/* ── PDF 저장 ── */
async function doDownload() {
  if (!pdfPage) return alert('PDF가 아직 로드되지 않았습니다.');
  const btn = document.getElementById('btn-download');
  btn.textContent = '생성 중...';
  btn.disabled = true;
  try {
    const canvas = document.createElement('canvas');
    await renderToCanvas(canvas, 2.5);  // 고해상도

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({unit: 'mm', format: 'a4', compress: true});
    const pw = pdf.internal.pageSize.getWidth();
    const ph = pdf.internal.pageSize.getHeight();
    pdf.addImage(canvas.toDataURL('image/jpeg', 0.92), 'JPEG', 0, 0, pw, ph);
    const fname = '홈택스수임동의신청서_' + (v('appl_name') || '작성중') + '.pdf';
    if (delIdData)  await addAttachmentPage(pdf, delIdData);
    if (applIdData) await addAttachmentPage(pdf, applIdData);
    pdf.save(fname);
  } finally {
    btn.textContent = 'PDF 저장';
    btn.disabled = false;
  }
}

/* ── 이벤트 연결 ── */
document.querySelectorAll('.form-panel input').forEach(el => {
  el.addEventListener('input', schedulePreview);
  el.addEventListener('change', schedulePreview);
});

/* ── 초기화 ── */
(async () => {
  loadDel();
  loadDelIdFromStorage();
  await loadPDF();
  initDrop('del-id-lbl', 'del');
  initDrop('appl-id-lbl', 'appl');
  doPreview();
})();
</script>
